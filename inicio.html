<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color:#333;
            background-color:bisque;
        }

        header {
            background: #1a1a2e;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .hero {
            background: linear-gradient(rgba(26, 26, 46, 0.7), rgba(22, 33, 62, 0.7)), 
                        url('https://noticias.upc.edu.pe/wp-content/uploads/2020/12/CIENCIAS-DE-LA-COMPUTACI%C3%93N-EN-SM.jpg') no-repeat center center/cover;
            height: 60vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }


    </style>
</head>
<body>
    <header><h1>Bienvenido a tu cuenta</h1></header>

    <section class ="hero">
        <h1>Automatiza ya</h1>
        <p>Automatiza con nosotros para mejorar tu emprendimiento</p>
        <a href="#contacto" class="btn">Automatizar</a>
    </section>
    
</body>
</html>
